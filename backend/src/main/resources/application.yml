spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/atlas_db}
    username: postgres
    password: Jasil@2004
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 20

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}
  compression:
    enabled: true
    mime-types: application/json
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

atlas:
  jwt:
    secret: ${JWT_SECRET:atlas-super-secret-key-minimum-256-bits-long-for-hs256-algorithm}
    expiration: ${JWT_EXPIRY:86400000}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:4173}

logging:
  level:
    com.atlas: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.flywaydb: INFO
